<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>getInnr — Logiciel de gestion pour studios fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="icon" href="assets/logo.png" type="image/png" />

<style>
  :root{
    --bg:#faf9f7;
    --bg-alt:#f2f1ed;
    --fg:#0d0d0d;
    --fg-soft:#3a3a38;
    --muted:#7a7a76;
    --line:#e6e4df;
    --line-strong:#d4d2cc;
    --accent:#a855f7;
    --accent-ink:#7c3aed;
    --accent-soft:#f3e8ff;
    --radius:14px;
    --shadow-card:0 1px 0 rgba(0,0,0,.02), 0 1px 2px rgba(0,0,0,.04);
    --font-sans: "Helvetica Neue", Helvetica, "Arial", sans-serif;
    --font-script: "Caveat Brush", "Helvetica Neue", sans-serif;
    --maxw: 1180px;
  }

  /* dark theme variables */
  html[data-theme="dark"]{
    --bg:#0c0b0d;
    --bg-alt:#141215;
    --fg:#f5f4f1;
    --fg-soft:#cfcdc8;
    --muted:#8b8985;
    --line:#26242a;
    --line-strong:#34323a;
    --accent:#c084fc;
    --accent-ink:#d8b4fe;
    --accent-soft:#1d1622;
    --shadow-card:0 1px 0 rgba(255,255,255,.02), 0 1px 2px rgba(0,0,0,.4);
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--fg); }
  body{
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01","cv11";
    letter-spacing: -0.005em;
  }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; }

  /* ───────────── Brandmark (HTML) ───────────── */
  .brand{
    display:inline-flex; align-items:baseline; gap:.18em;
    font-family: var(--font-sans);
    line-height: 1;
    color: var(--fg);
    user-select: none;
  }
  .brand .b-get{
    font-family: var(--font-script);
    color: var(--accent);
    font-size: .72em;
    transform: translateY(.06em) rotate(-6deg);
    margin-right: -.15em;
    letter-spacing: 0;
  }
  .brand .b-innr{
    font-weight: 900;
    letter-spacing: -0.04em;
    font-stretch: condensed;
  }
  .brand .b-dot{
    display:inline-block;
    width: .22em; height: .22em;
    border-radius: 50%;
    background: var(--accent);
    margin-left: .04em;
    transform: translateY(-.05em);
  }

  /* ───────────── Layout primitives ───────────── */
  .wrap{ max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  /* ───────────── Top nav ───────────── */
  .nav{
    position: sticky; top:0; z-index: 50;
    background: color-mix(in oklab, var(--bg) 86%, transparent);
    backdrop-filter: saturate(150%) blur(14px);
    -webkit-backdrop-filter: saturate(150%) blur(14px);
    border-bottom: 1px solid color-mix(in oklab, var(--line) 70%, transparent);
  }
  .nav-inner{
    display:flex; align-items:center; justify-content:space-between;
    height: 64px;
  }
  .nav .brand{ font-size: 24px; }
  .nav-meta{
    display:flex; align-items:center; gap: 22px;
    font-size: 13px; color: var(--fg-soft);
  }
  .nav-meta a{ color: var(--muted); transition: color .15s ease; }
  .nav-meta a:hover{ color: var(--fg); }
  .nav-cta{
    display:inline-flex; align-items:center; gap:8px;
    padding: 9px 14px; border-radius: 999px;
    background: var(--fg); color: var(--bg);
    font-size: 13px; font-weight: 500; letter-spacing: -.005em;
    border: 1px solid var(--fg);
    transition: transform .15s ease, opacity .15s ease;
    cursor: default;
  }
  .nav-cta:hover{ opacity: .9; }
  .nav-cta .dot{ width:6px; height:6px; border-radius:50%; background: var(--accent); }

  /* ───────────── Hero ───────────── */
  .hero{
    padding: 88px 0 64px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted);
    padding: 6px 12px; border:1px solid var(--line-strong); border-radius:999px;
    background: var(--bg);
  }
  .eyebrow .pulse{
    width:6px; height:6px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent);
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse{
    0%{ box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 55%, transparent); }
    70%{ box-shadow: 0 0 0 8px color-mix(in oklab, var(--accent) 0%, transparent); }
    100%{ box-shadow: 0 0 0 0 transparent; }
  }
  .h1{
    margin: 22px 0 18px;
    font-size: clamp(40px, 6vw, 76px);
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 1.02;
    text-wrap: balance;
  }
  .h1 .ser{
    color: var(--accent-ink);
  }
  .h1 .mark{
    display: inline-block;
    width: .22em; height: .22em;
    background: var(--accent);
    border-radius: 50%;
    transform: translateY(-.08em);
    margin-left: .02em;
  }
  .lede{
    font-size: clamp(16px, 1.4vw, 19px);
    line-height: 1.55;
    color: var(--fg-soft);
    max-width: 56ch;
    text-wrap: pretty;
  }

  .cta-row{
    display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    margin-top: 28px;
  }
  .btn{
    display:inline-flex; align-items:center; gap:10px;
    padding: 13px 20px; border-radius: 999px;
    font-size: 14px; font-weight: 500; letter-spacing: -.005em;
    border: 1px solid var(--fg); background: var(--fg); color: var(--bg);
    cursor: default;
    transition: transform .15s ease, background .15s ease, color .15s ease;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn .arr{ transition: transform .2s ease; }
  .btn:hover .arr{ transform: translateX(3px); }
  .btn-ghost{
    background: transparent; color: var(--fg);
    border: 1px solid var(--line-strong);
  }
  .btn-ghost:hover{ background: var(--bg-alt); }

  .hero-meta{
    margin-top: 28px;
    display:flex; gap: 28px; flex-wrap: wrap;
    font-size: 13px; color: var(--muted);
  }
  .hero-meta .item{ display:inline-flex; align-items:center; gap:8px; }
  .hero-meta .dot{ width:5px; height:5px; border-radius:50%; background: var(--accent); }

  /* hero — split layout */
  .hero.split .hero-grid{
    display: grid;
    grid-template-columns: 1.05fr .95fr;
    gap: 64px;
    align-items: center;
  }
  .hero.split .hero-visual{ display:block; }

  /* hero — centered layout */
  .hero.centered .hero-grid{ text-align: left; }
  .hero.centered .hero-visual{ display:none; }
  .hero.centered .h1{ font-size: clamp(48px, 7.8vw, 96px); max-width: 16ch; }
  .hero.centered .lede{ max-width: 60ch; }

  /* hero — editorial layout */
  .hero.editorial .hero-grid{
    display:grid; grid-template-columns: 1fr; gap: 40px;
  }
  .hero.editorial .h1{
    font-size: clamp(56px, 9vw, 128px);
    letter-spacing: -0.045em;
    line-height: .98;
  }
  .hero.editorial .lede-block{
    display:grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items:start;
    padding-top: 18px; border-top: 1px solid var(--line);
  }
  .hero.editorial .hero-visual{ display:none; }
  @media (max-width: 820px){
    .hero.editorial .lede-block{ grid-template-columns: 1fr; gap: 22px; }
  }

  /* visual placeholder — app screen */
  .hero-visual{
    position: relative;
    aspect-ratio: 4/5;
    display:flex; align-items:center; justify-content:center;
  }
  /* phone bezel that wraps a real screenshot */
  .phone-bezel{
    position: relative;
    width: 78%;
    max-width: 320px;
    aspect-ratio: 1206/2622;
    border-radius: 42px;
    background: #111;
    padding: 10px;
    box-shadow:
      0 0 0 2px color-mix(in oklab, var(--fg) 12%, transparent),
      0 60px 100px -40px rgba(0,0,0,.35),
      0 8px 20px -8px rgba(0,0,0,.18);
    z-index: 2;
  }
  .phone-bezel::before{
    content:""; position:absolute; left:50%; top:14px;
    transform: translateX(-50%);
    width: 90px; height: 22px; border-radius: 999px;
    background:#0a0a0a; z-index: 2;
  }
  .phone-bezel img{
    display:block; width:100%; height:100%;
    border-radius: 32px;
    object-fit: cover; object-position: top center;
  }
  html[data-theme="dark"] .phone-bezel{
    background: #000;
    box-shadow:
      0 0 0 2px rgba(255,255,255,.06),
      0 60px 100px -40px rgba(0,0,0,.8),
      0 8px 20px -8px rgba(0,0,0,.4);
  }

  /* floating desktop card behind phone */
  .desk-card{
    position: absolute;
    width: 64%;
    right: -4%;
    top: 22%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    box-shadow: 0 30px 60px -30px rgba(0,0,0,.25);
    z-index: 1;
    transform: rotate(2deg);
  }
  .desk-card .bar{
    display:flex; align-items:center; gap:6px;
    padding: 8px 10px; background: var(--bg-alt);
    border-bottom: 1px solid var(--line);
  }
  .desk-card .bar i{ width:8px; height:8px; border-radius:50%; background: var(--line-strong); }
  .desk-card img{ display:block; width: 100%; height: auto; }

  /* ───────────── Aperçu (real screenshots) ───────────── */
  .preview{
    padding: 112px 0;
    background: var(--bg-alt);
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .preview-stage{
    position: relative;
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 28px;
    align-items: end;
  }
  .pv-card{
    position: relative;
    border-radius: 18px;
    background: var(--bg);
    border: 1px solid var(--line);
    overflow: hidden;
    box-shadow: 0 30px 60px -40px rgba(0,0,0,.25), 0 2px 8px rgba(0,0,0,.04);
    transition: transform .25s ease;
  }
  .pv-card:hover{ transform: translateY(-4px); }
  .pv-card.is-mobile{
    aspect-ratio: 1206/2622;
    background: #111;
    padding: 8px;
    border-radius: 28px;
  }
  .pv-card.is-mobile img{
    width: 100%; height: 100%;
    object-fit: cover; object-position: top center;
    border-radius: 22px;
    display:block;
  }
  .pv-card.is-desktop{
    aspect-ratio: 2498/1168;
    padding: 0;
  }
  .pv-card.is-desktop .toolbar{
    display:flex; gap:6px; padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  .pv-card.is-desktop .toolbar i{
    width:9px; height:9px; border-radius:50%; background: var(--line-strong);
  }
  .pv-card.is-desktop img{ display:block; width:100%; height:auto; }

  .pv-cap{
    margin-top: 16px;
    display:flex; flex-direction: column; gap: 4px;
  }
  .pv-cap .kk{
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted);
  }
  .pv-cap .tt{
    font-size: 16px; font-weight: 500; letter-spacing: -.01em;
    color: var(--fg);
  }
  .pv-item{ display:flex; flex-direction: column; }

  /* Editorial staggered layout */
  .preview-stage .pv-item:nth-child(1){ transform: translateY(-24px); }
  .preview-stage .pv-item:nth-child(3){ transform: translateY(20px); }

  @media (max-width: 820px){
    .preview-stage{ grid-template-columns: 1fr; gap: 36px; }
    .preview-stage .pv-item:nth-child(1),
    .preview-stage .pv-item:nth-child(3){ transform: none; }
  }

  /* ───────────── Section heading ───────────── */
  .section{ padding: 96px 0; border-bottom: 1px solid var(--line); position: relative; }
  .sec-head{
    display:flex; align-items: flex-end; justify-content: space-between;
    gap: 40px; margin-bottom: 56px;
    flex-wrap: wrap;
  }
  .sec-kicker{
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted);
    display:inline-flex; align-items: center; gap:10px;
  }
  .sec-kicker::before{
    content:""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .sec-title{
    margin: 10px 0 0;
    font-size: clamp(32px, 4.2vw, 52px);
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1.05;
    max-width: 22ch;
    text-wrap: balance;
  }
  .sec-title .ser{ color: var(--accent-ink); }
  .sec-aside{
    max-width: 38ch; color: var(--fg-soft);
    font-size: 15px; line-height: 1.55;
  }

  /* ───────────── Features teaser ───────────── */
  .feat-grid{
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  }
  .feat-card{
    border:1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg);
    padding: 28px 26px 32px;
    display:flex; flex-direction:column; gap: 16px;
    transition: border-color .2s ease, transform .2s ease;
  }
  .feat-card:hover{ border-color: var(--line-strong); }
  .feat-num{
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; letter-spacing: .08em; color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    display:flex; justify-content: space-between; align-items: center;
  }
  .feat-num .glyph{
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    opacity: .9;
  }
  .feat-title{
    font-size: 22px; font-weight: 500; letter-spacing: -.02em;
    line-height: 1.15;
    margin: 4px 0 2px;
  }
  .feat-body{
    color: var(--fg-soft); font-size: 14.5px; line-height: 1.55;
    max-width: 32ch;
  }
  .feat-footer{
    margin-top: auto;
    padding-top: 18px; border-top: 1px dashed var(--line);
    display:flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--muted);
    letter-spacing: .04em; text-transform: uppercase;
  }

  /* locked teaser cards */
  .feat-grid.locked .feat-card{
    background: linear-gradient( to bottom, var(--bg), color-mix(in oklab, var(--bg-alt) 75%, var(--bg)) );
    position: relative;
  }
  .feat-card .lock{
    width: 28px; height: 28px; border-radius: 999px;
    border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center;
    color: var(--muted);
  }

  /* ───────────── Pillars (alt features layout) ───────────── */
  .pillars{
    display:grid; grid-template-columns: 1fr; gap: 0;
    border-top: 1px solid var(--line);
  }
  .pillar{
    display:grid; grid-template-columns: 220px 1fr 1fr; gap: 56px;
    padding: 36px 0;
    border-bottom: 1px solid var(--line);
    align-items: start;
  }
  .pillar-idx{
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted);
    display:flex; align-items:center; gap:10px;
  }
  .pillar-idx .glyph{ width:8px; height:8px; border-radius:50%; background: var(--accent); }
  .pillar h3{
    margin:0; font-weight: 500; font-size: 26px; letter-spacing: -.02em;
    line-height: 1.15;
    max-width: 18ch;
  }
  .pillar p{
    margin: 0; color: var(--fg-soft); font-size: 15px; line-height: 1.6;
    max-width: 40ch;
  }
  @media (max-width: 820px){
    .pillar{ grid-template-columns: 1fr; gap: 14px; padding: 28px 0; }
  }

  /* ───────────── Démo section ───────────── */
  .demo{
    padding: 112px 0 128px;
  }
  .demo-shell{
    display:grid; grid-template-columns: 1.05fr .95fr; gap: 80px;
    align-items: start;
  }
  .demo-claim{
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 500;
    letter-spacing: -.025em; line-height: 1.05;
    text-wrap: balance;
    margin: 14px 0 24px;
  }
  .demo-claim .ser{ color: var(--accent-ink); }
  .demo-list{
    list-style: none; padding: 0; margin: 28px 0 0;
    display:flex; flex-direction: column; gap: 14px;
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }
  .demo-list li{
    display:flex; align-items: flex-start; gap: 14px;
    font-size: 15px; color: var(--fg-soft); line-height: 1.5;
  }
  .demo-list .tick{
    flex: 0 0 auto; width: 18px; height: 18px; border-radius: 50%;
    border:1px solid var(--accent);
    background: var(--accent-soft);
    display:flex; align-items:center; justify-content:center;
    margin-top: 3px;
    color: var(--accent-ink);
  }

  .form-card{
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 30px 80px -40px rgba(0,0,0,.2), 0 2px 8px rgba(0,0,0,.04);
  }
  .form-card h4{
    margin: 0 0 4px;
    font-size: 18px; font-weight: 500; letter-spacing: -.01em;
  }
  .form-card .sub{
    color: var(--muted); font-size: 13px;
    margin-bottom: 22px;
  }
  .field{
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 14px;
  }
  .field label{
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted);
    display:flex; justify-content: space-between;
  }
  .field label .opt{ text-transform: none; letter-spacing: 0; }
  .field input, .field textarea, .field select{
    appearance: none;
    width: 100%;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    color: var(--fg);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: inherit; font-size: 14.5px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field textarea{ min-height: 96px; resize: vertical; }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent);
  }
  .field-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-submit{
    width: 100%;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid var(--fg);
    background: var(--fg); color: var(--bg);
    font-weight: 500; font-size: 14px; letter-spacing: -.005em;
    margin-top: 8px;
    cursor: default;
    display:inline-flex; align-items: center; justify-content: center; gap: 10px;
    transition: transform .15s ease;
  }
  .form-submit:hover{ transform: translateY(-1px); }
  .form-foot{
    margin-top: 14px;
    font-size: 12px; color: var(--muted); text-align: center;
  }

  .form-success{
    text-align: center;
    padding: 36px 16px;
  }
  .form-success .check{
    width:48px; height:48px; border-radius: 50%;
    border:1px solid var(--accent);
    background: var(--accent-soft); color: var(--accent-ink);
    display:flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .form-success h5{
    margin: 0 0 6px; font-size: 20px; font-weight: 500; letter-spacing: -.01em;
  }
  .form-success p{ margin: 0; color: var(--fg-soft); font-size: 14.5px; line-height: 1.5; }

  /* ───────────── Footer ───────────── */
  .footer{
    padding: 40px 0 56px;
    color: var(--muted);
    font-size: 13px;
    display:flex; align-items:center; justify-content: space-between; gap: 20px;
    flex-wrap: wrap;
    border-top: 1px solid var(--line);
  }
  .footer-left{ display:flex; align-items:center; gap: 20px; flex-wrap: wrap; }
  .footer-copy{ color: var(--muted); }
  .footer .brand{ font-size: 16px; }
  .footer-meta{ display:flex; gap: 22px; flex-wrap: wrap; }
  .footer-meta a{ color: var(--muted); transition: color .15s ease; }
  .footer-meta a:hover{ color: var(--fg); }

  /* utility */
  .accent-text{ color: var(--accent-ink); }
  .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; letter-spacing: .04em; }

  /* responsive */
  @media (max-width: 980px){
    .hero.split .hero-grid{ grid-template-columns: 1fr; gap: 48px; }
    .feat-grid{ grid-template-columns: 1fr; }
    .demo-shell{ grid-template-columns: 1fr; gap: 48px; }
    .pillar{ grid-template-columns: 1fr; }
  }
  @media (max-width: 640px){
    .nav-meta .nav-links{ display:none; }
    .hero{ padding: 56px 0 40px; }
    .section{ padding: 64px 0; }
    .demo{ padding: 72px 0 88px; }
  }

  /* visual rhythm: accent corner glyphs on sections */
  .corner{
    position: absolute; right: 28px; top: 36px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
  }
  .corner .dot{
