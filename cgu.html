<!doctype html>
<html lang="fr" data-page-slug="cgu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Conditions Générales d'Utilisation — getInnr</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#faf9f7;
    --bg-alt:#f2f1ed;
    --fg:#0d0d0d;
    --fg-soft:#3a3a38;
    --muted:#7a7a76;
    --line:#e6e4df;
    --line-strong:#d4d2cc;
    --accent:#a855f7;
    --accent-ink:#7c3aed;
    --accent-soft:#f3e8ff;
    --font-sans: "Helvetica Neue", Helvetica, "Arial", sans-serif;
    --font-script: "Caveat Brush", "Helvetica Neue", sans-serif;
    --maxw: 1180px;
  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--fg); }
  body{ font-family: var(--font-sans); font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased; letter-spacing:-.005em; }
  a{ color:inherit; text-decoration:none; }
  a:hover{ color: var(--accent-ink); }

  .brand{ display:inline-flex; align-items:baseline; gap:.18em; line-height:1; color:var(--fg); user-select:none; font-size:22px; }
  .brand .b-get{ font-family: var(--font-script); color: var(--accent); font-size:.72em; transform: translateY(.06em) rotate(-6deg); margin-right:-.15em; }
  .brand .b-innr{ font-weight:900; letter-spacing:-.04em; font-stretch:condensed; }
  .brand .b-dot{ display:inline-block; width:.22em; height:.22em; border-radius:50%; background:var(--accent); margin-left:.04em; transform: translateY(-.05em); }

  .wrap{ max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }

  .nav{
    position: sticky; top:0; z-index: 50;
    background: color-mix(in oklab, var(--bg) 86%, transparent);
    backdrop-filter: saturate(150%) blur(14px);
    border-bottom: 1px solid color-mix(in oklab, var(--line) 70%, transparent);
  }
  .nav-inner{ display:flex; align-items:center; justify-content: space-between; height: 64px; }
  .nav-back{
    display:inline-flex; align-items:center; gap:8px;
    font-size: 13px; color: var(--muted);
  }
  .nav-back:hover{ color: var(--fg); }

  /* Header */
  .doc-head{
    padding: 88px 0 56px;
    border-bottom: 1px solid var(--line);
  }
  .kicker{
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted);
    display:inline-flex; align-items:center; gap: 10px;
  }
  .kicker::before{ content:""; width: 6px; height:6px; border-radius:50%; background: var(--accent); }
  .doc-title{
    margin: 16px 0 16px;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 600;
    letter-spacing: -.035em;
    line-height: 1.02;
    text-wrap: balance;
    max-width: 18ch;
  }
  .doc-meta{
    margin-top: 22px;
    display: flex; gap: 28px; flex-wrap: wrap;
    font-size: 13px; color: var(--muted);
  }
  .doc-meta strong{ color: var(--fg-soft); font-weight: 500; }

  /* Body */
  .doc-body{
    display:grid; grid-template-columns: 220px 1fr; gap: 80px;
    padding: 72px 0 96px;
    max-width: var(--maxw);
    margin: 0 auto;
    padding-left: 28px; padding-right: 28px;
  }
  .toc{
    position: sticky; top: 88px; align-self: start;
    font-size: 13px;
    border-left: 1px solid var(--line);
    padding-left: 18px;
  }
  .toc h4{
    margin: 0 0 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .toc ol{
    list-style: none; padding: 0; margin: 0;
    counter-reset: toc;
    display:flex; flex-direction: column; gap: 8px;
  }
  .toc li{
    counter-increment: toc;
    display:flex; gap: 10px;
  }
  .toc li::before{
    content: counter(toc, decimal-leading-zero);
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; padding-top: 2px;
  }
  .toc a{ color: var(--fg-soft); }
  .toc a:hover{ color: var(--fg); }

  .doc-content{
    max-width: 64ch;
    font-size: 15.5px; line-height: 1.65;
    color: var(--fg-soft);
  }
  .doc-content h2{
    counter-increment: section;
    color: var(--fg);
    font-size: 22px; font-weight: 500;
    letter-spacing: -.015em;
    line-height: 1.25;
    margin: 56px 0 16px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display:flex; align-items: baseline; gap: 14px;
  }
  .doc-content h2::before{
    content: counter(section, decimal-leading-zero);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; letter-spacing: .08em;
    color: var(--accent-ink);
    flex: 0 0 auto;
  }
  .doc-content > section:first-of-type h2{ border-top: 0; padding-top: 0; margin-top: 0; }
  .doc-content{ counter-reset: section; }
  .doc-content h3{
    color: var(--fg);
    font-size: 16px; font-weight: 500;
    margin: 32px 0 10px;
  }
  .doc-content p{ margin: 0 0 14px; text-wrap: pretty; }
  .doc-content ul{ margin: 0 0 18px; padding-left: 18px; }
  .doc-content ul li{ margin-bottom: 8px; }
  .doc-content ul li::marker{ color: var(--accent); }
  .doc-content strong{ color: var(--fg); font-weight: 500; }
  .doc-content a{ color: var(--accent-ink); border-bottom: 1px solid color-mix(in oklab, var(--accent) 40%, transparent); }
  .doc-content a:hover{ border-bottom-color: var(--accent); }
  .doc-content .note{
    margin: 28px 0;
    padding: 18px 20px;
    background: var(--bg-alt);
    border: 1px solid var(--line);
    border-radius: 12px;
    font-size: 14px;
    color: var(--fg-soft);
  }
  .doc-content .placeholder{
    color: var(--accent-ink);
    font-style: normal;
    background: var(--accent-soft);
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--line));
    font-size: .9em;
  }
  .doc-content dl{ margin: 0 0 14px; }
  .doc-content dt{
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted);
    margin-top: 10px;
  }
  .doc-content dd{ margin: 2px 0 0; color: var(--fg); }

  .footer{
    padding: 40px 0 56px;
    color: var(--muted);
    font-size: 13px;
    display:flex; align-items:center; justify-content: space-between; gap: 20px;
    flex-wrap: wrap;
    border-top: 1px solid var(--line);
  }
  .footer-left{ display:flex; align-items:center; gap: 20px; flex-wrap: wrap; }
  .footer-meta{ display:flex; gap: 22px; flex-wrap: wrap; }
  .footer-meta a{ color: var(--muted); }
  .footer-meta a:hover{ color: var(--fg); }

  .doc-loading{
    grid-column: 1 / -1;
    color: var(--muted);
    font-size: 14px;
    margin: 0;
  }

  /** Conteneur unique : enfants directs participent à la grille du &lt;main&gt; */
  .legal-main-host{
    display: contents;
  }

  @media (max-width: 820px){
    .doc-body{ grid-template-columns: 1fr; gap: 32px; }
    .toc{ position: static; border-left: 0; padding-left: 0; border-bottom: 1px solid var(--line); padding-bottom: 18px; }
    .doc-head{ padding: 56px 0 36px; }
  }
</style>
</head>

</nav>

<header class="doc-head">

    <div class="doc-meta doc-meta-dynamic">
      <span><strong>Dernière mise à jour</strong> · 25 mai 2026</span>
